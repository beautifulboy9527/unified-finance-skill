<!-- K线图组件 -->
<div id="kline-section" style="margin: 30px 0;">
    <h3 style="font-size: 18px; margin-bottom: 15px;">📈 价格走势 (交互式K线图)</h3>
    
    <!-- 主图: K线 + 均线 -->
    <div id="kline-chart" style="width: 100%; height: 450px; margin-bottom: 10px;"></div>
    
    <!-- 副图: 成交量 -->
    <div id="volume-chart" style="width: 100%; height: 150px;"></div>
    
    <!-- 图例说明 -->
    <div style="display: flex; gap: 20px; margin-top: 10px; font-size: 13px; color: #666;">
        <span>🔵 MA5 (短期)</span>
        <span>🟢 MA10 (中期)</span>
        <span>🔴 MA20 (长期)</span>
        <span style="margin-left: auto;">💡 可缩放/拖拽查看详情</span>
    </div>
</div>

<!-- lightweight-charts CDN -->
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<script>
// K线数据 (由 Python 生成)
const candlestickData = {candlestick_json};

// MA5 数据
const ma5Data = {ma5_json};

// MA10 数据
const ma10Data = {ma10_json};

// MA20 数据
const ma20Data = {ma20_json};

// 成交量数据
const volumeData = {volume_json};

// 创建主图
const chart = LightweightCharts.createChart(document.getElementById('kline-chart'), {
    layout: {
        background: { type: 'solid', color: '#ffffff' },
        textColor: '#333',
    },
    grid: {
        vertLines: { color: '#f0f0f0' },
        horzLines: { color: '#f0f0f0' },
    },
    crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
    },
    rightPriceScale: {
        borderColor: '#cccccc',
    },
    timeScale: {
        borderColor: '#cccccc',
        timeVisible: true,
    },
});

// K线系列
const candlestickSeries = chart.addCandlestickSeries({
    upColor: '#26a69a',
    downColor: '#ef5350',
    borderVisible: false,
    wickUpColor: '#26a69a',
    wickDownColor: '#ef5350',
});
candlestickSeries.setData(candlestickData);

// MA5 线
const ma5Line = chart.addLineSeries({
    color: '#2196f3',
    lineWidth: 1,
    priceLineVisible: false,
    lastValueVisible: false,
});
ma5Line.setData(ma5Data);

// MA10 线
const ma10Line = chart.addLineSeries({
    color: '#4caf50',
    lineWidth: 1,
    priceLineVisible: false,
    lastValueVisible: false,
});
ma10Line.setData(ma10Data);

// MA20 线
const ma20Line = chart.addLineSeries({
    color: '#f44336',
    lineWidth: 1,
    priceLineVisible: false,
    lastValueVisible: false,
});
ma20Line.setData(ma20Data);

// 创建成交量图
const volumeChart = LightweightCharts.createChart(document.getElementById('volume-chart'), {
    layout: {
        background: { type: 'solid', color: '#ffffff' },
        textColor: '#333',
    },
    grid: {
        vertLines: { color: '#f0f0f0' },
        horzLines: { color: '#f0f0f0' },
    },
    rightPriceScale: {
        borderColor: '#cccccc',
    },
    timeScale: {
        visible: false,
    },
});

// 成交量柱状图
const volumeSeries = volumeChart.addHistogramSeries({
    priceFormat: {
        type: 'volume',
    },
    priceScaleId: '',
});
volumeSeries.setData(volumeData);

// 同步时间轴
chart.timeScale().subscribeVisibleTimeRangeChange(range => {
    volumeChart.timeScale().setVisibleRange(range);
});

// 自动缩放
chart.timeScale().fitContent();
volumeChart.timeScale().fitContent();

// 响应式调整
window.addEventListener('resize', () => {
    chart.applyOptions({
        width: document.getElementById('kline-chart').offsetWidth
    });
    volumeChart.applyOptions({
        width: document.getElementById('volume-chart').offsetWidth
    });
});
</script>
